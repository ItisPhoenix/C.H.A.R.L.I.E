use_default_settings: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "charlie_research_secret"
  base_url: http://localhost:8081/
  image_proxy: true

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    use_official_api: false
  - name: duckduckgo
    engine: duckduckgo
  - name: bing
    engine: bing
  - name: wikipedia
    engine: wikipedia

enabled_plugins:
  - 'Basic Constraints'
  # - 'Limiter'  # Disabled to prevent 403 on local tool calls

ui:
  theme: simple
  center_alignment: true
