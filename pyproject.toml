[project]
name = "charlie-sentinel"
version = "0.1.0"
description = "Completely Helpful And Rather Local Intelligent Engine"
requires-python = ">=3.12"
dependencies = [
    "aiohttp==3.13.5",
    "beautifulsoup4==4.14.3",
    "chromadb==1.5.8",
    "cloakbrowser==0.3.27",
    "ddgs==9.14.1",
    "duckduckgo-search==8.1.1",
    "easyocr==1.7.2",
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "feedparser==6.0.12",
    "faster-whisper==1.2.1",
    "keyring==25.6.0",
    "google-api-python-client==2.196.0",
    "google-auth-oauthlib==1.4.0",
    "lxml==6.1.0",
    "mcp==1.27.1",
    "mss==10.2.0",
    "notion-client==3.1.0",
    "numpy==2.4.4",
    "onnx==1.21.0",
    "onnxruntime-gpu==1.25.1",
    "openwakeword==0.4.0",
    "opencv-python==4.13.0.92",
    "packaging==26.1",
    "pillow==12.2.0",
    "kokoro-onnx>=0.4.0",
    "psutil==7.2.2",
    "pycaw==20251023",
    "pyautogui==0.9.54",
    "pygetwindow==0.0.9",
    "pygithub==2.9.1",
    "pytesseract>=0.3.10",
    "pynput==1.8.2",
    "pynvml==13.0.1",
    "pyperclip==1.11.0",
    "PyQt6==6.11.0",
    "pyqt6-sip==13.11.1",
    "python-dotenv==1.2.2",
    "python-telegram-bot==22.7",
    "pywin32==311",
    "pyyaml==6.0.3",
    "reportlab>=4.0",
    "requests==2.33.1",
    "scipy==1.17.1",
    "sounddevice==0.5.5",
    "tiktoken==0.13.0",
    "trafilatura==2.0.0",
    "watchdog==6.0.0",
    "uvicorn>=0.34.0",
    "webrtcvad-wheels==2.0.14",
    "sentence-transformers>=5.5.1",
    "websockets<15",
]

[tool.uv]
managed = true

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[dependency-groups]
dev = [
    "hypothesis>=6.155.1",
    "pyinstaller==6.20.0",
    "pytest==9.0.3",
    "pytest-aiohttp==1.1.0",
    "pytest-asyncio==1.3.0",
    "pytest-mock==3.15.1",
    "pytest-qt==4.5.0",
]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
ignore = [
    "E701",   # multiple statements on one line (colon) — style preference
    "E741",   # ambiguous variable name — used intentionally in math/loops
]
