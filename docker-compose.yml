# C.H.A.R.L.I.E. — Docker Compose
# MCP gateway for external tool connectivity.
# Start: docker-compose up -d mcp-gateway
# Stop:  docker-compose down

services:
  mcp-gateway:
    # MCP gateway provides SSE-based tool access.
    # Replace with your preferred MCP gateway image.
    image: mcp/gateway:latest
    ports:
      - "8080:8080"
    environment:
      - MCP_GATEWAY_TOKEN=${MCP_GATEWAY_TOKEN}
      - MCP_GATEWAY_HOST=0.0.0.0
    restart: unless-stopped

  searxng:
    # Private search engine (optional). Bypasses DDG rate limits.
    # Uncomment to enable: require SEARXNG_SECRET in .env
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    restart: unless-stopped
    networks:
      - charlie-net
    profiles:
      - optional

networks:
  charlie-net:
    driver: bridge
