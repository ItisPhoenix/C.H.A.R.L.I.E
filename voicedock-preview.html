<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VoiceDock Revamp Preview</title>
<style>
  /* ---- Tokens copied from frontend/src/app/globals.css ---- */
  :root {
    --color-canvas: #05060d;
    --color-canvas-2: #080a16;
    --color-aurora: #4f8cff;
    --color-aurora-soft: #7aa7ff;
    --color-aurora-dim: rgba(79, 140, 255, 0.14);
    --glass-bg: rgba(14, 18, 34, 0.55);
    --glass-bg-2: rgba(20, 26, 46, 0.42);
    --glass-border: rgba(140, 170, 255, 0.10);
    --glass-border-hover: rgba(122, 167, 255, 0.32);
    --text-primary: #f4f7ff;
    --text-secondary: #aab4d4;
    --text-muted: #67708f;
    --status-idle: #67708f;
    --status-listening: #4f8cff;
    --status-thinking: #b89bff;
    --status-speaking: #4be3a6;
    --status-error: #ff6b81;
    --status-warning: #ffc46b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(circle at 20% 0%, rgba(79,140,255,0.18), transparent 55%),
      radial-gradient(circle at 90% 100%, rgba(122,167,255,0.12), transparent 55%),
      var(--color-canvas);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 40px 24px;
  }
  h1 { font-weight: 600; letter-spacing: -0.02em; }
  h1 small { display:block; color: var(--text-muted); font-weight: 400; font-size: 13px; letter-spacing: 0; margin-top: 6px; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0 32px;
  }
  .controls button {
    background: var(--glass-bg-2);
    border: 1px solid var(--glass-border);
    color: var(--text-secondary);
    border-radius: 12px; padding: 8px 14px; cursor: pointer;
    font: inherit; font-size: 13px; transition: border-color .2s, color .2s;
  }
  .controls button:hover { border-color: var(--glass-border-hover); color: var(--text-primary); }
  .controls button.active { border-color: var(--color-aurora); color: var(--color-aurora-soft); }

  /* ---- The dock itself ---- */
  .dock {
    margin: 0 auto 28px;
    max-width: 920px;
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
    padding: 14px 18px;
    border-radius: 28px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    box-shadow: 0 14px 40px rgba(2,4,12,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .dock.muted { border-color: rgba(255,107,129,0.45); box-shadow: 0 0 22px rgba(255,107,129,0.18), inset 0 1px 0 rgba(255,255,255,0.05); }

  /* Waveform */
  .wave { flex: 1; display: flex; align-items: center; justify-content: center; gap: 3px; height: 44px; }
  .bar {
    width: 3px; border-radius: 99px;
    background: var(--status-idle);
    height: 3px;
  }
  .dock[data-state="listening"] .bar { background: var(--status-listening); animation: wave-listening 1.1s ease-in-out infinite; }
  .dock[data-state="thinking"]  .bar { background: var(--status-thinking);  animation: wave-thinking 1.4s ease-in-out infinite; }
  .dock[data-state="speaking"]  .bar { background: var(--status-speaking);  animation: wave-speaking 0.9s ease-in-out infinite; }
  .dock.muted .bar { background: var(--status-error); animation: none !important; height: 3px !important; }

  @keyframes wave-idle { 0%,100% { height: 3px; } }
  @keyframes wave-listening { 0%,100% { height: 5px; } 50% { height: var(--wave-height, 34px); } }
  @keyframes wave-thinking { 0%,100% { opacity: .5; height: 7px; } 50% { opacity: 1; height: 16px; } }
  @keyframes wave-speaking { 0% { height: 5px; } 25% { height: var(--wave-height, 30px); } 50% { height: 9px; } 75% { height: var(--wave-height, 22px); } 100% { height: 5px; } }

  /* State label (so color isn't the only signal) */
  .state-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    min-width: 92px; text-align: center;
    color: var(--status-idle);
  }
  .dock[data-state="listening"] .state-label { color: var(--status-listening); }
  .dock[data-state="thinking"]  .state-label { color: var(--status-thinking); }
  .dock[data-state="speaking"]  .state-label { color: var(--status-speaking); }
  .dock.muted .state-label { color: var(--status-error); }

  /* Right cluster */
  .cluster { display: flex; align-items: center; gap: 12px; border-left: 1px solid var(--glass-border); padding-left: 18px; }
  .iconbtn {
    width: 38px; height: 38px; border-radius: 14px; display: grid; place-items: center;
    cursor: pointer; transition: background .2s, color .2s, box-shadow .2s;
    border: 1px solid var(--glass-border);
    background: transparent; color: var(--text-secondary);
  }
  .iconbtn:hover { color: var(--text-primary); border-color: var(--glass-border-hover); }
  .iconbtn.mute-on { background: rgba(255,107,129,0.16); color: var(--status-error); border-color: rgba(255,107,129,0.4); }
  .micbtn { color: var(--status-speaking); }
  .micbtn.off { color: var(--status-error); animation: glow-pulse 1.6s ease-in-out infinite; }

  @keyframes glow-pulse { 0%,100% { box-shadow: 0 0 8px rgba(255,107,129,0.25);} 50% { box-shadow: 0 0 18px rgba(255,107,129,0.5);} }

  /* Volume reveal on hover */
  .volwrap { display: flex; align-items: center; gap: 8px; }
  .volslider {
    display: none; align-items: center; gap: 8px;
  }
  .volwrap:hover .volslider, .volwrap:focus-within .volslider { display: flex; }
  .volslider input[type="range"] { width: 96px; accent-color: var(--color-aurora); cursor: pointer; }
  .volval { font: 10px/1 "JetBrains Mono", monospace; color: var(--text-muted); width: 26px; text-align: right; }

  .caption { text-align:center; color: var(--text-muted); font-size: 12px; margin-top: -12px; }
  svg { width: 18px; height: 18px; }
</style>
</head>
<body>
  <h1>VoiceDock Revamp — Option A + state label
    <small>Live preview using your exact globals.css tokens &amp; wave-* keyframes. Hover the speaker to reveal the volume slider. Click a state to watch the waveform.</small>
  </h1>

  <div class="controls">
    <button data-pick="idle" class="active">idle</button>
    <button data-pick="listening">listening</button>
    <button data-pick="thinking">thinking</button>
    <button data-pick="speaking">speaking</button>
    <button id="muteBtn">toggle mute</button>
  </div>

  <!-- The dock -->
  <div class="dock" id="dock" data-state="idle">
    <div class="wave" id="wave"></div>
    <div class="state-label" id="label">idle</div>
    <div class="cluster">
      <div class="volwrap">
        <button class="iconbtn" id="spk" aria-label="Mute speaker">
          <svg id="spkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
        </button>
        <div class="volslider">
          <input type="range" id="vol" min="0" max="1" step="0.05" value="1" />
          <span class="volval" id="volval">100</span>
        </div>
      </div>
      <button class="iconbtn micbtn" id="mic" aria-label="Microphone on">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 19v3"/></svg>
      </button>
    </div>
  </div>
  <p class="caption" id="caption">state: idle · speaker: on · volume: 100%</p>

<script>
  // Build bars
  const wave = document.getElementById('wave');
  const BARS = 24, CENTER = BARS / 2;
  for (let i = 0; i < BARS; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    const dist = Math.abs(i - CENTER) / CENTER;
    b.style.setProperty('--wave-height', (10 + (1 - dist) * 30) + 'px');
    b.style.animationDelay = (i * 0.045).toFixed(2) + 's';
    wave.appendChild(b);
  }

  const dock = document.getElementById('dock');
  const label = document.getElementById('label');
  const caption = document.getElementById('caption');
  let state = 'idle', muted = false, volume = 1;

  function render() {
    dock.dataset.state = state;
    dock.classList.toggle('muted', muted);
    label.textContent = muted ? 'muted' : state;
    const spk = document.getElementById('spk');
    spk.classList.toggle('mute-on', muted);
    document.getElementById('spkIcon').innerHTML = muted
      ? '<path d="M11 5 6 9H2v6h4l5 4z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/>'
      : '<path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/>';
    const mic = document.getElementById('mic');
    mic.classList.toggle('off', false);
    caption.textContent = `state: ${state} · speaker: ${muted ? 'muted' : 'on'} · volume: ${Math.round((muted?0:volume)*100)}%`;
  }

  document.querySelectorAll('.controls button[data-pick]').forEach(btn => {
    btn.addEventListener('click', () => {
      state = btn.dataset.pick;
      document.querySelectorAll('.controls button[data-pick]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
  document.getElementById('muteBtn').addEventListener('click', () => { muted = !muted; render(); });
  document.getElementById('spk').addEventListener('click', () => { muted = !muted; render(); });
  document.getElementById('vol').addEventListener('input', e => { volume = Number(e.target.value); if (volume > 0) muted = false; document.getElementById('volval').textContent = Math.round((muted?0:volume)*100); render(); });

  render();
</script>
</body>
</html>
