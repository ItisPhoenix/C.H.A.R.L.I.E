direct_commands:
  # Simple string commands (exact match)
  "time": "_tool_time"
  "date": "_tool_date"

  # Regex patterns for flexible matching - Apps
  "regex:\\b(open|launch|start)\\b.*\\b(app|application|program)\\b": "_tool_open_app"
  "regex:\\b(close|exit|quit|stop)\\b.*\\b(app|application|program)\\b": "_tool_close_app"
  "regex:\\b(focus|switch\\s+to|bring\\s+to\\s+front)\\b.*\\b(window|app)\\b": "_tool_app_focus"
  "regex:\\b(list|show)\\b.*\\b(running|open)\\b.*\\b(apps?|applications|programs)\\b": "_tool_app_list"
  "regex:\\b(kill|force\\s+close|end)\\b.*\\b(process|task)\\b": "_tool_app_kill"

  # Regex patterns for flexible matching - Browser
  "regex:\\b(new|open)\\b.*\\b(tab)\\b": "_tool_browser_new_tab"
  "regex:\\b(close)\\b.*\\b(tab)\\b": "_tool_browser_close_tab"
  "regex:\\b(switch|change)\\b.*\\b(tab)\\b.*\\b(next|forward)\\b": "_tool_browser_switch_next"
  "regex:\\b(switch|change)\\b.*\\b(tab)\\b.*\\b(previous|back)\\b": "_tool_browser_switch_previous"
  "regex:\\b(go|navigate)\\b.*\\b(back|previous)\\b": "_tool_browser_go_back"
  "regex:\\b(go|navigate)\\b.*\\b(forward|next)\\b": "_tool_browser_go_forward"
  "regex:\\b(scroll|move)\\b.*\\b(down|up)\\b": "_tool_browser_scroll"
  "regex:\\b(type|enter|input)\\b.*\\b(text|words)\\b": "_tool_browser_type"
  "regex:\\b(click|press)\\b.*\\b(button|element)\\b": "_tool_browser_click"
  "regex:\\b(take|get|show)\\b.*\\b(screenshot|capture|screen.*shot)\\b": "_tool_browser_screenshot"
  "regex:\\b(zoom)\\b.*\\b(in|out|reset)\\b": "_tool_browser_zoom"
  "regex:\\b(bookmarks|favorites)\\b": "_tool_browser_bookmarks"
  "regex:\\b(history|browsing\\s+history)\\b": "_tool_browser_history"
  "regex:\\b(clear|delete)\\b.*\\b(cache|cookies|data)\\b": "_tool_browser_clear_cache"
  "regex:\\b(go\\s+to|navigate\\s+to|visit)\\b.*\\b(https?://[^\\s]+|\\w+\\.\\w+)\\b": "_tool_browser_navigate"

  # Regex patterns for flexible matching - System & Research
  "regex:\\b(pc|computer|system)\\b.*\\b(status|info|state)\\b": "_tool_get_pc_status"
  "regex:\\b(what.*happening|what.*going.*on)\\b.*\\b(pc|computer|system)\\b": "_tool_get_pc_status"
  "regex:\\b(search|find|look.*up|research)\\b.*\\b(web|online|internet)\\b": "_tool_web_research"
  "regex:\\b(analyze|examine|review)\\b.*\\b(code|codebase|project)\\b": "_tool_code_analyze"
  "regex:\\b(search|find|grep)\\b.*\\b(code|function|class)\\b": "_tool_code_search"
  "regex:\\b(analyze|check|review)\\b.*\\b(dependencies|deps|packages)\\b": "_tool_deps_analyze"
  "regex:\\b(lock)\\b.*\\b(pc|computer|system|workstation)\\b": "_tool_lock_workstation"
  "regex:\\b(sleep|suspend)\\b.*\\b(pc|computer|system)\\b": "_tool_sleep_pc"
  "regex:\\b(shutdown|power\\s+off|turn\\s+off)\\b.*\\b(pc|computer|system)\\b": "_tool_shutdown"
  "regex:\\b(restart|reboot)\\b.*\\b(pc|computer|system)\\b": "_tool_system_reboot"

  # Regex patterns for Vision
  "regex:\\b(what.*on.*screen|what.*do.*you.*see|look.*at.*screen|describe.*screen)\\b": "_tool_analyze_screen"
  "regex:\\b(read.*screen|what.*does.*screen.*say|screen.*text|ocr)\\b": "_tool_read_screen_text"
  "regex:\\b(what.*in.*this.*image|describe.*image|analyze.*image|look.*at.*this)\\b": "_tool_describe_image"